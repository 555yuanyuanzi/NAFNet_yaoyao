# python -m basicsr.train -opt options/train/GoPro/NAFNet-width64-nafgate-dfpb.yml --launcher none
# general settings
name: NAFNet-GoPro-width64-NAFGate-DFPB
model_type: ImageRestorationModel
scale: 1
num_gpu: 1
manual_seed: 10

datasets:
  train:
    name: gopro-train
    type: PairedImageDataset
    dataroot_gt: /workspace/polarv1/data/gopro_v1/flat/train/sharp_crops.lmdb
    dataroot_lq: /workspace/polarv1/data/gopro_v1/flat/train/blur_crops.lmdb

    filename_tmpl: '{}'
    io_backend:
      type: lmdb

    gt_size: 256
    use_flip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: gopro-test
    type: PairedImageDataset
    dataroot_gt: /workspace/polarv1/data/gopro_v1/flat/test/sharp
    dataroot_lq: /workspace/polarv1/data/gopro_v1/flat/test/blur
    io_backend:
      type: disk


network_g:
  type: NAFNetLocal
  width: 64
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]
  use_gdpm: false
  use_pa: false
  use_ipp: false

  # Shallow NAFBlock-internal frequency gate.
  # Ablation:
  #   gate only: set use_dfpb to false.
  #   enc1/2 only: set nafblock_freq_gate_stages to [enc1, enc2].
  #   all kernels 5: set all freq_gate_low_kernel_size values to 5.
  use_nafblock_freq_gate: true
  nafblock_freq_gate_stages: [enc1, enc2, enc3]
  nafblock_freq_gate_kwargs:
    freq_gate_low_kernel_size: 5
    freq_gate_hidden_channels: 16
    stage_kwargs:
      enc1:
        freq_gate_low_kernel_size: 9
      enc2:
        freq_gate_low_kernel_size: 7
      enc3:
        freq_gate_low_kernel_size: 5

  # Deep full DFPB for structural frequency modeling.
  use_dfpb: true
  use_fftdfpb: false
  use_wavedfpb: false
  use_layerwise_dfpb: false
  use_layerwise_wavedfpb: false
  dfpb_stages: [enc4]
  dfpb_kwargs:
    low_kernel_size: 5
    low_blocks: 1
    branch_expand_ratio: 2
    use_deformable_fusion: true

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: AdamW
    lr: !!float 7e-4
    weight_decay: !!float 1e-3
    betas: [0.9, 0.9]

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 400000
    eta_min: !!float 1e-7

  total_iter: 400000
  warmup_iter: -1 # no warm up

  # losses
  pixel_opt:
    type: PSNRLoss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  val_freq: !!float 1e4
  save_img: false


  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
