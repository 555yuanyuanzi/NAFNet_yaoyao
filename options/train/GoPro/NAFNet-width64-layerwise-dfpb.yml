# python -m basicsr.train -opt options/train/GoPro/NAFNet-width64-layerwise-dfpb.yml --launcher none
# general settings
name: NAFNet-GoPro-width64-LayerwiseDFPB
model_type: ImageRestorationModel
scale: 1
num_gpu: 1
manual_seed: 10

datasets:
  train:
    name: gopro-train
    type: PairedImageDataset
    dataroot_gt: /workspace/polarv1/data/gopro_v1/flat/train/sharp_crops.lmdb
    dataroot_lq: /workspace/polarv1/data/gopro_v1/flat/train/blur_crops.lmdb

    filename_tmpl: '{}'
    io_backend:
      type: lmdb

    gt_size: 256
    use_flip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: gopro-test
    type: PairedImageDataset
    dataroot_gt: /workspace/polarv1/data/gopro_v1/flat/test/sharp
    dataroot_lq: /workspace/polarv1/data/gopro_v1/flat/test/blur
    io_backend:
      type: disk


network_g:
  type: NAFNetLocal
  width: 64
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]
  use_gdpm: false
  use_pa: false
  use_dfpb: false
  use_fftdfpb: false
  use_wavedfpb: false
  use_layerwise_dfpb: true
  # Ablation tips:
  #   enc4 only: set layerwise_dfpb_stages to [enc4] and keep tier_map.enc4 = 3.
  #   enc3+enc4: set layerwise_dfpb_stages to [enc3, enc4].
  #   full layer-wise: keep [enc1, enc2, enc3, enc4].
  layerwise_dfpb_stages: [enc1, enc2, enc3, enc4]
  layerwise_dfpb_kwargs:
    low_kernel_size: 5
    spatial_hidden: 16
    reduction: 4
    low_blocks: 1
    branch_expand_ratio: 2
    use_deformable_fusion: true
    tier_map:
      enc1: 1
      enc2: 1
      enc3: 2
      enc4: 3
    stage_kwargs:
      enc1:
        low_kernel_size: 5
      enc2:
        low_kernel_size: 5
      enc3:
        low_kernel_size: 5
      enc4:
        low_kernel_size: 5
        use_deformable_fusion: true

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: AdamW
    lr: !!float 7e-4
    weight_decay: !!float 1e-3
    betas: [0.9, 0.9]

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 400000
    eta_min: !!float 1e-7

  total_iter: 400000
  warmup_iter: -1 # no warm up

  # losses
  pixel_opt:
    type: PSNRLoss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  val_freq: !!float 2e4
  save_img: false


  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 1e4
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
